# Jenkins Configuration-as-Code for Briklab
jenkins:
  systemMessage: "Briklab - Jenkins"
  numExecutors: 2
  mode: NORMAL
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: "${JENKINS_ADMIN_PASSWORD:-Brik-Jenkins-2026!}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: "http://jenkins.briklab.test:9090/"
  globalLibraries:
    libraries:
      - name: "brik"
        defaultVersion: "main"
        retriever:
          modernSCM:
            scm:
              git:
                remote: "http://gitea.briklab.test:3000/brik/brik.git"

tool:
  git:
    installations:
      - name: Default
        home: git

jobs:
  - script: >
      pipelineJob('node-minimal') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea.briklab.test:3000/brik/node-minimal.git')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
