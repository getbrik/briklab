# Jenkins Configuration-as-Code for Briklab
jenkins:
  systemMessage: "Briklab - Jenkins"
  numExecutors: 8
  mode: NORMAL
  globalNodeProperties:
    - envVars:
        env:
          - key: BRIK_PUBLISH_DOCKER_USER
            value: "admin"
          - key: BRIK_PUBLISH_DOCKER_PASSWORD
            value: "${NEXUS_ADMIN_PASSWORD}"
          - key: BRIK_PUBLISH_NPM_TOKEN
            value: "${NEXUS_NPM_TOKEN}"
          - key: BRIK_PUBLISH_PYPI_TOKEN
            value: "admin:${NEXUS_ADMIN_PASSWORD}"
          - key: BRIK_PUBLISH_MAVEN_USER
            value: "admin"
          - key: BRIK_PUBLISH_MAVEN_PASSWORD
            value: "${NEXUS_ADMIN_PASSWORD}"
          - key: BRIK_PUBLISH_CARGO_TOKEN
            value: "Basic ${NEXUS_CARGO_TOKEN}"
          - key: BRIK_PUBLISH_NUGET_TOKEN
            value: "admin:${NEXUS_ADMIN_PASSWORD}"
          - key: BRIK_REGISTRY_HOST
            value: "nexus.briklab.test:8082"
          - key: BRIK_REGISTRY_USER
            value: "admin"
          - key: BRIK_REGISTRY_PASSWORD
            value: "${NEXUS_ADMIN_PASSWORD}"
          # Nexus 3 UI URL (port 8081) -- distinct from the docker push
          # endpoint (port 8082). Surfaced as business.registry.ui_url in
          # the aggregate report so the HTML view links to the actual
          # image browser page.
          - key: BRIK_PACKAGE_REGISTRY_UI_URL
            value: "http://nexus.briklab.test:8081"
          - key: BRIK_SSH_STRICT_HOST_KEY
            value: "no"
          # Path to the SSH private key for node-deploy-ssh E2E test.
          # The host file is mounted by docker-compose at this path; the
          # deploy stage container inherits the mount via --volumes-from.
          # transverse.ssh.setup_agent loads the key file into ssh-agent.
          - key: SSH_PRIVATE_KEY
            value: "/opt/brik/ssh/deploy_key"
          - key: BRIK_KUBECTL_OPTS
            value: "--insecure-skip-tls-verify --validate=false"
          - key: ARGOCD_SERVER
            value: "host.docker.internal:${ARGOCD_PORT}"
          - key: ARGOCD_AUTH_TOKEN
            value: "${ARGOCD_AUTH_TOKEN}"
          - key: ARGOCD_INSECURE
            value: "true"
          # DSI-owned org policy URL (chantier 20260508 P3). Jenkins jobs
          # resolve the file via the docker-compose mount at /etc/brik/policy/.
          # Production deployments swap this for an https:// URL pointing
          # at the DSI repo; the brik runtime uses curl which supports both.
          - key: BRIK_POLICY_URL
            value: "file:///etc/brik/policy/brik-policy.yml"
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          password: "${JENKINS_ADMIN_PASSWORD:-Brik-Jenkins-2026}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - giteaAccessToken:
              scope: GLOBAL
              id: gitea-admin-pat
              description: "Gitea admin PAT - used by gitea-plugin for webhook management, multibranch scans, and commit-status push-back"
              token: "${GITEA_PAT}"

unclassified:
  location:
    url: "http://jenkins.briklab.test:9090/"
  giteaServers:
    servers:
      - displayName: briklab
        serverUrl: "http://gitea.briklab.test:3000"
        manageHooks: true
        credentialsId: gitea-admin-pat
  globalLibraries:
    libraries:
      - name: "brik"
        defaultVersion: "main"
        # NB: do not add `cachingConfiguration` here. Disabling the cache
        # (refreshTimeMinutes=0) made the plugin switch from the
        # `@libs/<SHA>/` workspace layout to `@libs/<lib_name>/`, which
        # breaks brikIntegrate's BRIK_HOME resolution (it expects the
        # SHA-keyed dir produced by the cached path). Cache invalidation
        # is handled instead by briklab's push flow:
        # see scripts/lib/e2e/lib/push.sh::e2e.push.brik_repos which
        # wipes `workspace/*@libs/<SHA>/` after every Gitea push.
        retriever:
          modernSCM:
            scm:
              git:
                remote: "http://gitea.briklab.test:3000/brik/brik.git"

tool:
  git:
    installations:
      - name: Default
        home: git

# Each pipelineJob below declares BRIK_DRY_RUN and BRIK_TAG via the Job DSL
# `parameters {}` block so they exist in the Jenkins UI from the moment the
# job is created. This mirrors the `properties([parameters([...])])` block
# in shared-libs/jenkins/vars/brikIntegrate.groovy, which is the source of
# truth and re-applies the same params on each build (idempotent update).
# Without this duplication the first build of a freshly-created job has no
# "Build with Parameters" button -- a long-standing Jenkins limitation:
# parameters declared inside the pipeline body only register *after* the
# first run. Note the syntax difference: at Job DSL level it's
# `parameters {}` directly under `pipelineJob`, NOT
# `properties { parameters {} }` (that nesting is the Jenkinsfile-side
# Workflow plugin DSL, which is incompatible with Job DSL).
jobs:
  - script: >
      pipelineJob('node-complete') {
        parameters {
          booleanParam('BRIK_DRY_RUN', false, 'Skip destructive deploy actions (compose up, k8s apply, helm upgrade, argocd sync, rsync). Print what would run instead.')
          stringParam('BRIK_TAG', '', 'Release tag for this build (e.g. v0.1.0). Leave empty for snapshot builds.')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea.briklab.test:3000/brik/node-complete.git')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
  - script: >
      pipelineJob('node-full') {
        parameters {
          booleanParam('BRIK_DRY_RUN', false, 'Skip destructive deploy actions (compose up, k8s apply, helm upgrade, argocd sync, rsync). Print what would run instead.')
          stringParam('BRIK_TAG', '', 'Release tag for this build (e.g. v0.1.0). Leave empty for snapshot builds.')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea.briklab.test:3000/brik/node-full.git')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
  - script: >
      pipelineJob('node-deploy-gitops') {
        parameters {
          booleanParam('BRIK_DRY_RUN', false, 'Skip destructive deploy actions (compose up, k8s apply, helm upgrade, argocd sync, rsync). Print what would run instead.')
          stringParam('BRIK_TAG', '', 'Release tag for this build (e.g. v0.1.0). Leave empty for snapshot builds.')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea.briklab.test:3000/brik/node-deploy-gitops.git')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
  - script: >
      pipelineJob('node-deploy-gitops-rollback') {
        parameters {
          booleanParam('BRIK_DRY_RUN', false, 'Skip destructive deploy actions (compose up, k8s apply, helm upgrade, argocd sync, rsync). Print what would run instead.')
          stringParam('BRIK_TAG', '', 'Release tag for this build (e.g. v0.1.0). Leave empty for snapshot builds.')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea.briklab.test:3000/brik/node-deploy-gitops-rollback.git')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
  - script: >
      multibranchPipelineJob('node-workflow-trunk') {
        branchSources {
          branchSource {
            source {
              giteaSCMSource {
                id('gitea-node-workflow-trunk')
                serverUrl('http://gitea.briklab.test:3000')
                repoOwner('brik')
                repository('node-workflow-trunk')
                credentialsId('gitea-admin-pat')
                traits {
                  giteaBranchDiscovery { strategyId(3) }
                  giteaTagDiscovery()
                  // Origin pull/merge requests. strategyId(2) = build the PR
                  // source branch HEAD (not a merge commit), mirroring GitLab's
                  // default merge_request_event pipeline which runs on the MR
                  // source ref. CHANGE_ID is set on these builds, so
                  // jenkins-wrapper.sh surfaces BRIK_PIPELINE_SOURCE=merge_request_event.
                  giteaPullRequestDiscovery { strategyId(2) }
                }
              }
            }
          }
        }
        factory {
          workflowBranchProjectFactory { scriptPath('Jenkinsfile') }
        }
        orphanedItemStrategy {
          discardOldItems { numToKeep(5) }
        }
      }
  - script: >
      pipelineJob('node-plan-tag') {
        parameters {
          booleanParam('BRIK_DRY_RUN', false, 'Skip destructive deploy actions (compose up, k8s apply, helm upgrade, argocd sync, rsync). Print what would run instead.')
          stringParam('BRIK_TAG', '', 'Release tag for this build (e.g. v0.1.0). Leave empty for snapshot builds.')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea.briklab.test:3000/brik/node-plan-tag.git')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
  - script: >
      pipelineJob('node-full-cve') {
        parameters {
          booleanParam('BRIK_DRY_RUN', false, 'Skip destructive deploy actions (compose up, k8s apply, helm upgrade, argocd sync, rsync). Print what would run instead.')
          stringParam('BRIK_TAG', '', 'Release tag for this build (e.g. v0.1.0). Leave empty for snapshot builds.')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea.briklab.test:3000/brik/node-full-cve.git')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
      }
  # node-deploy-channel is a CI+CD project: two jobs over one repo (design S7.2).
  # CI = multibranch (brikIntegrate via Jenkinsfile); CD = parameterized
  # pipelineJob (brikDeploy via Jenkinsfile.deploy). A CD run never touches the
  # CI job's history/artifacts.
  - script: >
      multibranchPipelineJob('node-deploy-channel') {
        branchSources {
          branchSource {
            source {
              giteaSCMSource {
                id('gitea-node-deploy-channel')
                serverUrl('http://gitea.briklab.test:3000')
                repoOwner('brik')
                repository('node-deploy-channel')
                credentialsId('gitea-admin-pat')
                traits {
                  giteaBranchDiscovery { strategyId(3) }
                  giteaTagDiscovery()
                  giteaPullRequestDiscovery { strategyId(2) }
                }
              }
            }
          }
        }
        factory {
          workflowBranchProjectFactory { scriptPath('Jenkinsfile') }
        }
        orphanedItemStrategy {
          discardOldItems { numToKeep(5) }
        }
      }
  - script: >
      pipelineJob('node-deploy-channel-deploy') {
        parameters {
          stringParam('BRIK_DEPLOY_VERSION', '', 'Artifact version to deploy (e.g. v0.1.0). Required.')
          stringParam('BRIK_DEPLOY_ENVIRONMENT', '', 'Target environment key from deploy.environments (e.g. staging). Required.')
          booleanParam('BRIK_DRY_RUN', false, 'Skip destructive deploy actions; print what would run instead.')
        }
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('http://gitea.briklab.test:3000/brik/node-deploy-channel.git')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile.deploy')
          }
        }
      }
