  - { ref: "ghcr.io/getbrik/brik-runner-node",     tag: "24",   digest: "sha256:b43d5362fbd373868f11d107194b3197ceb864056e7ade8d5588694b4d90b861" }
  - { ref: "ghcr.io/getbrik/brik-runner-python",   tag: "3.13", digest: "sha256:c9a3da24a0bf43465f9df3ca5f04aac9bdf1264b54f5ddbc5b6a5ab1b4f2547f" }
