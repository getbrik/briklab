  - { ref: "ghcr.io/getbrik/brik-runner-node",     tag: "24",   digest: "sha256:1dc21b32962b00225026b7264d088c9db4e7c3ae32799bb5369e2ab49ecdcc09" }
  - { ref: "ghcr.io/getbrik/brik-runner-python",   tag: "3.13", digest: "sha256:0c7b63e9a1577d8b3d4778a4061a5100bf5ec41119f80e235a231f8661e8038c" }
