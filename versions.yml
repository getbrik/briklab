# Briklab -- SINGLE SOURCE OF TRUTH for all component versions.
#
# Edit this file, then run:  make versions
# CI guard:                  make versions-check
#
# Generated artifacts (DO NOT EDIT BY HAND -- they are overwritten):
#   - versions.env                  image tags + build args, loaded by docker compose
#   - config/jenkins/plugins.txt    pinned Jenkins plugins
#   - config/brik-images.lock.yaml  digest-pinned brik-runner images
#
# Why digests for runner images: the brik-runner tags (:latest, :22, :3.13...)
# are mutable. Pinning the multi-arch index digest makes a clean rebuild pull
# the exact same images the E2E suite was validated against.

# --- Infra service images (docker compose) ---
infra:
  gitlab:               "gitlab/gitlab-ce:18.10.1-ce.0"
  gitlab_runner:        "gitlab/gitlab-runner:alpine3.21-bleeding"
  gitlab_runner_helper: "gitlab/gitlab-runner-helper:alpine3.21-arm-bleeding"
  gitea:                "gitea/gitea:1.26.2"
  nexus:                "sonatype/nexus3:3.92.2-alpine"
  openbao:              "openbao/openbao:2.5.4"
  jenkins_base:         "jenkins/jenkins:2.541.3-lts-jdk21"
  ssh_target_base:      "alpine:3.23"

# --- Kubernetes / GitOps control plane (scripts/lib/setup/k3d.sh) ---
kubernetes:
  k3s:    "rancher/k3s:v1.33.6-k3s1"
  argocd: "v3.3.7"

# --- Build-time tools baked into the custom Jenkins image ---
tools:
  yq: "v4.44.6"

# --- Jenkins plugins (pinned to the versions installed in the running image) ---
jenkins_plugins:
  configuration-as-code: "2077.v41f1011a_5110"
  git:                   "5.10.1"
  workflow-aggregator:   "608.v67378e9d3db_1"
  pipeline-stage-view:   "2.41"
  docker-workflow:       "634.vedc7242b_eda_7"
  docker-plugin:         "1316.v75635a_002b_0a_"
  gitlab-plugin:         "1.9.13"
  gitea:                 "273.vb_78d13f6d9a_d"
  credentials-binding:   "720.v3f6decef43ea_"
  job-dsl:               "3654.vdf58f53e2d15"
  ansicolor:             "536.v13fa_b_860c267"
  timestamper:           "1.30"
  ws-cleanup:            "0.49"
  pipeline-groovy-lib:   "797.v90ea_a_9b_e45a_0"
  warnings-ng:           "13.10085.v94a_d6ca_82b_f6"

# --- brik-runner images, digest-pinned. Full matrix published on ghcr.io/getbrik.
# tag MUST match what the brik runtime requests (runner_classes.yml + stack
# manifests): base/analysis/scanner/deploy -> latest; stacks -> their version.
# digest is the multi-arch index pulled and then tagged locally by sync-brik-images.sh,
# so a job's `pull_policy: if-not-present` resolves the tag to the pinned image.
runner_images:
  - { ref: "ghcr.io/getbrik/brik-runner-base",     tag: "latest", digest: "sha256:8f10758303246c2dc8cb69b838d25463f09306f3199e18d8004286d5006d42c9" }
