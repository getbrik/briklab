# False-positive patterns for E2E log validation.
# One grep -E (regex) pattern per line.
# Lines matching these patterns are ALWAYS treated as errors, even if they
# also match error-ignore-patterns.conf. Use this file for known noise that
# the project considers a bug (cache/artefact misconfigurations, etc.) and
# must be eliminated rather than silenced.
#
# Companion to error-patterns.conf (errors filtered by ignore) and
# error-ignore-patterns.conf (ignore list applied to error-patterns matches).

# CI cache:paths / artifacts:paths array matched zero files. Addressed by
# runner setup (brik.wrapper.ensure_artefact_markers in base-wrapper.sh)
# pre-creating placeholders for every declared cache/artifact dir.
WARNING:[[:space:]]+No files to upload
WARNING:[[:space:]]+No files to cache

# Note: "WARNING: Cache file does not exist" is intentionally NOT listed
# here. It fires legitimately on the first run of a project (no cache yet
# to pull), and the log alone cannot distinguish first-run from stale-cache
# scenarios. Move it to error-ignore-patterns.conf if it becomes noisy.
