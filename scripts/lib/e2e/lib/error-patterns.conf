# Error patterns for E2E log validation.
# One grep -E (regex) pattern per line.
# Lines matching these patterns in CI job logs indicate real errors.

# Generic fatal errors
^FATAL[[:space:]]
^FATAL:
panic:
Segmentation fault
SIGSEGV
OutOfMemoryError
OOMKilled
killed$

# Stack traces
Traceback \(most recent call last\)
Exception in thread
at [a-zA-Z0-9_]+\.[a-zA-Z0-9_]+\(.*\.java:[0-9]+\)

# Brik runtime errors
\[ERROR\]
stage\.run.*FAILED
brik-lib.*error

# Build tool errors
BUILD FAILED
FAILURE: Build failed
npm ERR!
pip install.*failed
cargo.*error\[

# Process exit errors
exited with code [1-9]
exit code [1-9]

# Docker / container runtime errors
^Error response from daemon
failed to set up container networking
Bind for .* failed: port is already allocated

# Deploy / release errors
argocd.*sync failed
helm.*(install|upgrade) failed
kubectl.*error

# Package publish collisions
crate .* already exists on
403 Forbidden.*already exists
409 Conflict
