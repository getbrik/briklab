# Known false positives for E2E log validation.
# One grep -E (regex) pattern per line.
# Lines matching these patterns are excluded from error detection.

# npm warnings that contain "ERR" in benign context
npm warn
npm WARN

# Tool output that mentions "error" in non-error context
0 errors
0 error
error_reporting
error_page
error_log
errorCount.*0
errors found: 0

# Security scan tools include "ERROR" severity in their reports
severity.*ERROR
severity.*error
level.*ERROR

# Docker/registry warnings
WARNING: Using a password
DEPRECATION WARNING
WARNING:

# GitLab CI mechanisms
allow_failure

# Python deprecation warnings that look like errors
DeprecationWarning
FutureWarning

# npm audit output (mentions "high", "critical" in non-error context)
vulnerabilities
found 0

# Gradle/Maven build output
BUILD SUCCESSFUL
Build successful
