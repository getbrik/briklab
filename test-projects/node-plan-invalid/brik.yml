version: 1
project:
  name: node-plan-invalid
  stack: node
  stack_version: "22"
pipeline:
  selection:
    # aggressive is reserved for v0.7+ (per-subproject impact graph).
    # The planner refuses it with an actionable message, so the
    # brik-plan parent job fails and no child pipeline is created --
    # this is L.1 scenario 3 ("plan invalide -> brik-plan echoue").
    mode: aggressive
test:
  framework: npm
