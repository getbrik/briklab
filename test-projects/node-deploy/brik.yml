version: 1

project:
  name: node-deploy
  stack: node
  stack_version: "22"

release:
  strategy: semver
  tag_prefix: v

quality:
  lint:
    enabled: false

test:
  framework: npm

package:
  docker:
    image: nexus.briklab.test:8082/brik/node-deploy
    dockerfile: Dockerfile

publish:
  docker:
    image: nexus.briklab.test:8082/brik/node-deploy
    registry: nexus.briklab.test:8082
    username_var: BRIK_PUBLISH_DOCKER_USER
    password_var: BRIK_PUBLISH_DOCKER_PASSWORD

deploy:
  workflow: trunk-based
  environments:
    staging:
      target: compose
      compose_file: docker-compose.yml
