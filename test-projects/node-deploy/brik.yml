version: 1

project:
  name: node-deploy
  stack: node
  stack_version: "22"

release:
  strategy: semver
  tag_prefix: v

quality:
  lint:
    enabled: false

test:
  framework: npm

package:
  docker:
    image: brik-registry:5050/brik/node-deploy
    dockerfile: Dockerfile

deploy:
  workflow: trunk-based
  environments:
    staging:
      target: compose
      compose_file: docker-compose.yml
