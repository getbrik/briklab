version: 1
project:
  name: python-complete
  stack: python
  stack_version: "3.13"
release:
  strategy: semver
  tag_prefix: v
test:
  framework: pytest
  reports:
    enabled: true
quality:
  lint:
    enabled: true
    tool: ruff
security:
  deps:
    severity: high
  secrets: {}
  container:
    # Test fixture: limit container-scan failures to CRITICAL CVEs.
    # Official base images regularly carry HIGH-rated transitive CVEs
    # that would otherwise block the E2E suite without reflecting a
    # real security regression in this project.
    severity: critical
package:
  docker:
    image: nexus.briklab.test:8082/brik/python-complete
    dockerfile: Dockerfile
publish:
  docker:
    registry: nexus.briklab.test:8082
    username_var: BRIK_PUBLISH_DOCKER_USER
    password_var: BRIK_PUBLISH_DOCKER_PASSWORD
  pypi:
    repository: http://nexus.briklab.test:8081/repository/brik-pypi/
    token_var: BRIK_PUBLISH_PYPI_TOKEN
