version: 1
project:
  name: node-deploy-signed
  stack: node
  stack_version: "22"
release:
  strategy: semver
  tag_prefix: v
test:
  framework: npm
package:
  docker:
    image: nexus.briklab.test:8082/brik/node-deploy-signed
    dockerfile: Dockerfile
publish:
  docker:
    registry: nexus.briklab.test:8082
    username_var: BRIK_PUBLISH_DOCKER_USER
    password_var: BRIK_PUBLISH_DOCKER_PASSWORD

# CD flow -- named artifact channels (P0). The release channel registry must
# match package.docker.image so a `brik run` publishes the version this
# environment later resolves to a digest.
artifacts:
  channels:
    release:
      registry: nexus.briklab.test:8082/brik/node-deploy-signed
  # BuildEvidence store. After the container scan signs the published digest,
  # CI records evidence/<version>/sha256-<digest>.json here and ssh-signs the
  # commit with the referential's evidence-signing key; verification uses
  # trust/allowed_signers from the same referential.
  evidence:
    repo: http://gitea.briklab.test:3000/brik/evidence-signed.git
    token_var: BRIK_GIT_TOKEN
    branch: main
    sign: true

# One environment is enough to prove the artifact gates: the CD flow resolves
# the version to a digest, verifies the signed attestations and the builder/
# source expectations on that digest (require_attestation), then requires the
# digest-bound authorization grant in the promotion journal
# (requires_eligibility) -- brik authorize writes it between CI and CD.
deploy:
  environments:
    staging:
      target: gitops
      accepts_channel: release
      gates:
        require_digest: true
        require_attestation: true
        expected_builder: "^http://gitlab\\.briklab\\.test:8929/-/brik/"
        expected_source: "gitlab\\.briklab\\.test:8929/brik/node-deploy-signed$"
        requires_eligibility: [artifact_authorized_for]
      repo: http://gitea.briklab.test:3000/brik/config-deploy-signed.git
      git_token_var: BRIK_GIT_TOKEN
      path: k8s
      source: k8s
      controller: argocd
      app_name: brik-e2e-signed
