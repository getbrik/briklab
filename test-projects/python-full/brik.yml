version: 1

project:
  name: python-full
  stack: python
  stack_version: "3.13"

release:
  strategy: semver
  tag_prefix: v

test:
  framework: pytest

quality:
  lint:
    enabled: true
    tool: ruff

security:
  deps:
    severity: high
  secrets: {}

package:
  docker:
    image: brik-registry:5050/brik/python-full
    dockerfile: Dockerfile
