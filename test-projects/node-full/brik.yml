version: 1

project:
  name: node-full
  stack: node
  stack_version: "22"

release:
  strategy: semver
  tag_prefix: v

test:
  framework: npm

quality:
  lint:
    enabled: true
    tool: eslint

package:
  docker:
    # brik-registry resolves inside the brik-net Docker network (GitLab runner)
    image: registry.briklab.test:5050/brik/node-full
    dockerfile: Dockerfile
