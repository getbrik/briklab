version: 1

project:
  name: node-full
  stack: node

release:
  strategy: semver
  tag_prefix: v

test:
  framework: npm

quality:
  enabled: true
  lint:
    tool: eslint

package:
  docker:
    # brik-registry resolves inside the brik-net Docker network (GitLab runner)
    image: brik-registry:5050/brik/node-full
    dockerfile: Dockerfile
