version: 1
project:
  name: java-complete
  stack: java
  stack_version: "21"
release:
  strategy: semver
  tag_prefix: v
test:
  framework: maven
  coverage:
    threshold: 80
  reports:
    enabled: true
    junit:
      # Maven Surefire produces one JUnit XML per test class under
      # target/surefire-reports/, which brik's java stack flattens into
      # reports/junit/. Use a glob so GitLab artifacts.reports.junit picks
      # them all up (single-file path is for stacks like python/dotnet).
      output_path: reports/junit/*.xml
quality:
  lint:
    enabled: true
    tool: checkstyle
security:
  deps:
    severity: high
  secrets: {}
  license:
    allowed: "MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause"
  iac:
    tool: checkov
package:
  docker:
    image: nexus.briklab.test:8082/brik/java-complete
    dockerfile: Dockerfile
publish:
  docker:
    registry: nexus.briklab.test:8082
    username_var: BRIK_PUBLISH_DOCKER_USER
    password_var: BRIK_PUBLISH_DOCKER_PASSWORD
  maven:
    repository: http://nexus.briklab.test:8081/repository/brik-maven/
    username_var: BRIK_PUBLISH_MAVEN_USER
    password_var: BRIK_PUBLISH_MAVEN_PASSWORD
