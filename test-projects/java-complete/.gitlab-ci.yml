variables:
  BRIK_LIB_REF: "v0.1.0"
  BRIK_GITLAB_TEMPLATES_REF: "v0.1.0"

include:
  - project: 'brik/gitlab-templates'
    ref: v0.1.0
    file: '/templates/pipeline.yml'

# NOTE: java-complete used to override brik-test.artifacts.reports.coverage_report
# to point at jacoco.xml. That override worked with the legacy
# /templates/pipeline.yml because brik-test was defined in the include
# that the parent merged into. With pipeline.yml the parent has
# only brik-plan + brik-downstream, so a top-level `brik-test:` block at
# the parent is rejected by GitLab CI lint ("config should implement the
# script:, run:, or trigger: keyword"). The jacoco XML is still produced
# as a Brik artifact -- only the GitLab UI coverage badge is lost until
# the child-pipeline generator learns to forward per-project overrides.
