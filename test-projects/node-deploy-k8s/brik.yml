version: 1
project:
  name: node-deploy-k8s
  stack: node
  stack_version: "22"
release:
  strategy: semver
  tag_prefix: v
quality:
  lint:
    enabled: false
test:
  framework: npm
package:
  docker:
    image: nexus.briklab.test:8082/brik/node-deploy-k8s
    dockerfile: Dockerfile
publish:
  docker:
    registry: nexus.briklab.test:8082
    username_var: BRIK_PUBLISH_DOCKER_USER
    password_var: BRIK_PUBLISH_DOCKER_PASSWORD
deploy:
  workflow: trunk-based
  environments:
    staging:
      target: k8s
      namespace: brik-e2e-k8s
      manifest: k8s/deployment.yaml
