apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-deploy-gitops
  labels:
    app: node-deploy-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-deploy-gitops
  template:
    metadata:
      labels:
        app: node-deploy-gitops
    spec:
      containers:
        - name: app
          image: nexus.briklab.test:8082/brik/node-deploy-gitops:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
