version: 1
project:
  name: node-deploy-gitops
  stack: node
  stack_version: "22"
release:
  strategy: semver
  tag_prefix: v
test:
  framework: npm
package:
  docker:
    image: nexus.briklab.test:8082/brik/node-deploy-gitops
    dockerfile: Dockerfile
publish:
  docker:
    registry: nexus.briklab.test:8082
    username_var: BRIK_PUBLISH_DOCKER_USER
    password_var: BRIK_PUBLISH_DOCKER_PASSWORD
deploy:
  workflow: trunk-based
  environments:
    staging:
      target: gitops
      repo: http://gitea.briklab.test:3000/brik/config-deploy-gitops.git
      git_token_var: BRIK_GIT_TOKEN
      path: k8s
      source: k8s
      controller: argocd
      app_name: brik-e2e-gitops
