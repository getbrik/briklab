version: 1

project:
  name: node-deploy-gitops
  stack: node
  stack_version: "22"

release:
  strategy: semver
  tag_prefix: v

quality:
  lint:
    enabled: false

test:
  framework: npm

package:
  docker:
    image: registry.briklab.test:5050/brik/node-deploy-gitops
    dockerfile: Dockerfile

publish:
  docker:
    image: registry.briklab.test:5050/brik/node-deploy-gitops

deploy:
  workflow: trunk-based
  environments:
    staging:
      target: gitops
      repo: http://brik:Brik-Gitea-2026@gitea.briklab.test:3000/brik/config-deploy.git
      path: k8s
      source: k8s
      controller: argocd
      app_name: brik-e2e
