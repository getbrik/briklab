# CI+CD project (one repo, two flows selected by the trigger).
#
# include:rules picks exactly one template per run, so there is only ever one
# top-level workflow: and no conflict:
#   - no CD inputs              -> brik-integrate.yml (CI: push/tag/MR/web)
#   - BRIK_DEPLOY_VERSION set   -> brik-deploy.yml    (CD: Run pipeline / API)
# include:rules only sees pre-pipeline variables, and BRIK_DEPLOY_VERSION arrives
# as a trigger variable, so the discriminator is visible at include time.
variables:
  BRIK_LIB_REF: "v0.1.0"
  BRIK_GITLAB_TEMPLATES_REF: "v0.1.0"

include:
  - project: 'brik/gitlab-templates'
    ref: v0.1.0
    file: '/templates/brik-integrate.yml'
    rules:
      - if: '$BRIK_DEPLOY_VERSION == ""'
  - project: 'brik/gitlab-templates'
    ref: v0.1.0
    file: '/templates/brik-deploy.yml'
    rules:
      - if: '$BRIK_DEPLOY_VERSION != "" && $BRIK_DEPLOY_ENVIRONMENT != ""'
