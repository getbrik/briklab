# Nextest CI profile used by `cargo nextest run --profile ci` when
# brik's test stage runs with quality.test.reports.enabled=true.
#
# nextest resolves the junit.path relative to the profile store dir
# (target/nextest/ci/), so ../../../brik-artifacts/test/junit.xml lands at the
# repository root under brik-artifacts/test/junit.xml -- the same path the GitLab
# template and Jenkins junit step look for.
[profile.ci.junit]
path = "../../../brik-artifacts/test/junit.xml"
