version: 1

project:
  name: rust-complete
  stack: rust

release:
  strategy: semver
  tag_prefix: v

test:
  framework: cargo

quality:
  enabled: true
  lint:
    tool: clippy
  format:
    tool: rustfmt

security:
  enabled: true

package:
  docker:
    image: nexus.briklab.test:8082/brik/rust-complete
    dockerfile: Dockerfile

publish:
  docker:
    image: nexus.briklab.test:8082/brik/rust-complete
    registry: nexus.briklab.test:8082
    username_var: NEXUS_DOCKER_USER
    password_var: NEXUS_DOCKER_PASSWORD
  cargo:
    token_var: NEXUS_CARGO_TOKEN
