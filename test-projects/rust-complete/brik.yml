version: 1
project:
  name: rust-complete
  stack: rust
  stack_version: "1"
release:
  strategy: semver
  tag_prefix: v
test:
  framework: cargo
  reports:
    enabled: true
quality:
  lint:
    enabled: true
    tool: clippy
  format:
    tool: rustfmt
security:
  deps:
    severity: high
  secrets: {}
  container:
    # Test fixture: limit container-scan failures to CRITICAL CVEs.
    # Official base images regularly carry HIGH-rated transitive CVEs
    # that would otherwise block the E2E suite without reflecting a
    # real security regression in this project.
    severity: critical
package:
  docker:
    image: nexus.briklab.test:8082/brik/rust-complete
    dockerfile: Dockerfile
publish:
  cargo:
    registry: brik-cargo
    index: "sparse+http://nexus.briklab.test:8081/repository/brik-cargo/"
    token_var: BRIK_PUBLISH_CARGO_TOKEN
  docker:
    registry: nexus.briklab.test:8082
    username_var: BRIK_PUBLISH_DOCKER_USER
    password_var: BRIK_PUBLISH_DOCKER_PASSWORD
