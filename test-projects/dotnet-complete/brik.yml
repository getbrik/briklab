version: 1
project:
  name: dotnet-complete
  stack: dotnet
  stack_version: "9.0"
release:
  strategy: semver
  tag_prefix: v
test:
  framework: dotnet
  reports:
    enabled: true
quality:
  lint:
    enabled: true
    tool: dotnet-format
security:
  deps:
    severity: high
  secrets: {}
  container:
    # Test fixture: limit container-scan failures to CRITICAL CVEs.
    # Official base images regularly carry HIGH-rated transitive CVEs
    # that would otherwise block the E2E suite without reflecting a
    # real security regression in this project.
    severity: critical
package:
  docker:
    image: nexus.briklab.test:8082/brik/dotnet-complete
    dockerfile: Dockerfile
publish:
  docker:
    registry: nexus.briklab.test:8082
    username_var: BRIK_PUBLISH_DOCKER_USER
    password_var: BRIK_PUBLISH_DOCKER_PASSWORD
  nuget:
    source: http://nexus.briklab.test:8081/repository/brik-nuget/
    token_var: BRIK_PUBLISH_NUGET_TOKEN
