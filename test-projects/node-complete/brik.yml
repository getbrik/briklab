version: 1
project:
  name: node-complete
  stack: node
  stack_version: '22'
release:
  strategy: semver
  tag_prefix: v
test:
  framework: jest
  reports:
    enabled: true
quality:
  lint:
    enabled: true
    tool: eslint
  format:
    tool: prettier
security:
  deps:
    # jest-junit 16 transitively pulls uuid 8.3.2 which has GHSA-w5hq-g745-h8pq
    # (CVSS 6.3). The fix requires uuid 14+, which is a breaking API change
    # incompatible with jest-junit. Lower the threshold to critical for this
    # test fixture so the chantier 15 reports.enabled path can be validated
    # end-to-end without an unrelated transitive dev-dep CVE blocking it.
    severity: critical
  secrets: {}
  container:
    # Test fixture: limit container-scan failures to CRITICAL CVEs.
    # Official base images regularly carry HIGH-rated transitive CVEs
    # that would otherwise block the E2E suite without reflecting a
    # real security regression in this project.
    severity: critical
package:
  docker:
    image: nexus.briklab.test:8082/brik/node-complete
    dockerfile: Dockerfile
publish:
  docker:
    registry: nexus.briklab.test:8082
    username_var: BRIK_PUBLISH_DOCKER_USER
    password_var: BRIK_PUBLISH_DOCKER_PASSWORD
  npm:
    registry: http://nexus.briklab.test:8081/repository/brik-npm/
    token_var: BRIK_PUBLISH_NPM_TOKEN
