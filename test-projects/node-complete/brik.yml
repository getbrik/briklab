version: 1

project:
  name: node-complete
  stack: node
  stack_version: "22"

release:
  strategy: semver
  tag_prefix: v

test:
  framework: npm

quality:
  enabled: true
  lint:
    tool: eslint
  format:
    tool: prettier

security:
  enabled: true

package:
  docker:
    image: nexus.briklab.test:8082/brik/node-complete
    dockerfile: Dockerfile

publish:
  docker:
    image: nexus.briklab.test:8082/brik/node-complete
    registry: nexus.briklab.test:8082
    username_var: NEXUS_DOCKER_USER
    password_var: NEXUS_DOCKER_PASSWORD
  npm:
    registry: http://nexus.briklab.test:8081/repository/brik-npm/
    token_var: NEXUS_NPM_TOKEN
