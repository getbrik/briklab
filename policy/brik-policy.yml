# Brik organizational policy file -- briklab dev edition.
#
# This file is the source of truth for the lab's DSI-owned policy. It is
# mounted read-only into gitlab-runner and jenkins at /etc/brik/policy/,
# and pipelines reach it via the CI variable
#   BRIK_POLICY_URL=file:///etc/brik/policy/brik-policy.yml
#
# In production, the equivalent file lives in a dedicated DSI repository
# and BRIK_POLICY_URL points to its raw HTTP(S) URL. The Brik runtime
# uses curl which supports both schemes natively, so no code change is
# required to flip from file:// to http(s)://.
#
# Schema: schemas/policy/v1/brik-policy.schema.json (in the brik repo).
#
# Editing rules (mirror of production governance):
#   - Each entry MUST carry a reason and an expires date (YYYY-MM-DD).
#     There is no permanent allowlist by design.
#   - To scope an entry to specific projects, set projects: [name1, name2].
#     Project names match BRIK_PROJECT_NAME exactly (no wildcards in v1).
#     Omitting projects[] applies the entry to every project.
#   - Expired entries are silently ignored at runtime.
#
# Default state: empty allowlist. The built-in pragmatic preset still
# ignores findings without an upstream fix; bring entries in here only
# when the DSI agrees to a documented exception.

# Optional preset override. When set, wins over the project's
# quality.findings.policy. Allowed values: pragmatic | strict | permissive.
# preset: pragmatic

# State-repo branch-protection posture at deploy (lab hardening tier 1).
# The lab's state repos carry real Gitea branch protection (the E2E reset
# re-poses the rule around its baseline force-push), so an unprotected or
# unprovable branch refuses the deploy, as in the enterprise posture.
# Allowed values: required | warn | off. Absent means warn.
state_repo_protection: required

allow:
  cve: []

  paths:
    # Environmental CVEs from base-image transitive dependencies. The
    # node runner images bundle npm at /usr/local/lib/node_modules/npm
    # which carries its own vendored copy of brace-expansion, glob,
    # minimatch, tar, etc. Those advisories are real but not under any
    # project's control here -- they ship with the upstream node image
    # and are resolved by upgrading the runner image, not by editing the
    # application code. Captured per chantier 20260511 bug E.
    - glob: "**/usr/local/lib/node_modules/npm/node_modules/**"
      reason: |
        npm bundled vendored dependencies in the node runner image
        (cross-spawn, brace-expansion, glob, ip-address, minimatch, tar,
        diff). Resolved by upgrading the brik-runner-node base image.
        Tracked in brik-images repo; revisit at next runner-image rebuild.
      expires: 2026-08-09

    # Alpine apk database: CVEs in busybox / ssl_client / gnutls /
    # coreutils / gnupg / freetype (Alpine 3.23 + Temurin base). Same
    # environmental class as the npm bundled deps. The fix is an Alpine
    # base-image upgrade in brik-runner-*, not application-level
    # remediation.
    - glob: "**/lib/apk/db/installed"
      reason: |
        Alpine apk-managed CVEs (busybox, ssl_client, gnutls, coreutils,
        gnupg, freetype) in the runner base image. Resolved by bumping
        the Alpine base layer in brik-runner-*. Tracked in brik-images
        repo.
      expires: 2026-08-09

    # OpenJDK runtime bundled in the Java runner image
    # (eclipse-temurin:21-jdk-jammy and equivalents). CVEs flagged against
    # the JDK itself are resolved by bumping the temurin base in
    # brik-runner-java, not by editing the application code.
    - glob: "**/opt/java/openjdk/**"
      reason: |
        OpenJDK runtime CVEs in the Java runner image (Temurin JDK).
        Resolved by bumping the temurin base layer in brik-runner-java.
        Tracked in brik-images repo.
      expires: 2026-08-09

    # CPython interpreter bundled in the Python runner image. CVEs
    # against the interpreter binary are resolved by bumping the
    # python: base image in brik-runner-python, not by editing the
    # application code.
    - glob: "**/usr/local/bin/python*"
      reason: |
        CPython interpreter CVEs in the Python runner image. Resolved
        by bumping the python: base layer in brik-runner-python.
        Tracked in brik-images repo.
      expires: 2026-08-09

