# Briklab - Local CI/CD test infrastructure for Brik
# GitLab CE + Runner + Gitea + Jenkins + Nexus + SSH target
# K8s cluster is managed separately via k3d (see scripts/lib/setup/k3d.sh)
#
# Usage:
#   docker compose up -d
#   docker compose down

networks:
  brik-net:
    name: ${DOCKER_NETWORK:-brik-net}
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.20.0.0/16}

services:
  # --- GitLab CE ---
  gitlab:
    image: gitlab/gitlab-ce:18.10.1-ce.0
    container_name: brik-gitlab
    hostname: ${GITLAB_HOSTNAME:-gitlab.briklab.test}
    restart: unless-stopped
    environment:
      GITLAB_ROOT_PASSWORD: ${GITLAB_ROOT_PASSWORD:-Brik-Gtlb-2026}
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${GITLAB_HOSTNAME:-gitlab.briklab.test}:${GITLAB_HTTP_PORT:-8929}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT:-2222}
        # Reduce memory usage
        puma['worker_processes'] = 2
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false
        # Integrated registry disabled (using Nexus Docker hosted registry on port 8082)
        registry['enable'] = false
        # Disable unnecessary services
        gitlab_kas['enable'] = false
        sentinel['enable'] = false
    ports:
      - "${GITLAB_HTTP_PORT:-8929}:${GITLAB_HTTP_PORT:-8929}"
      - "${GITLAB_SSH_PORT:-2222}:22"
    volumes:
      - ./data/gitlab/config:/etc/gitlab
      - ./data/gitlab/logs:/var/log/gitlab
      - ./data/gitlab/data:/var/opt/gitlab
    networks:
      brik-net:
        ipv4_address: 172.20.0.10
    mem_limit: ${GITLAB_MEM_LIMIT:-12g}
    shm_size: "256m"
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost:${GITLAB_HTTP_PORT:-8929}/users/sign_in"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 300s

  # --- GitLab Runner ---
  # The runner itself is lightweight; CI jobs run as sibling containers.
  # Memory limit covers the runner process only, not the spawned job containers.
  gitlab-runner:
    image: gitlab/gitlab-runner:alpine3.21-bleeding
    container_name: brik-runner
    restart: unless-stopped
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/gitlab-runner:/etc/gitlab-runner
    mem_limit: ${GITLAB_RUNNER_MEM_LIMIT:-1g}
    networks:
      brik-net:
        ipv4_address: 172.20.0.11
    extra_hosts:
      - "${GITLAB_HOSTNAME:-gitlab.briklab.test}:172.20.0.10"
      - "${NEXUS_HOSTNAME:-nexus.briklab.test}:172.20.0.30"
      - "ssh-target.briklab.test:172.20.0.41"

  # --- Gitea ---
  gitea:
    image: gitea/gitea:1.25.5
    container_name: brik-gitea
    hostname: ${GITEA_HOSTNAME:-gitea.briklab.test}
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__DOMAIN=${GITEA_HOSTNAME:-gitea.briklab.test}
      - GITEA__server__SSH_DOMAIN=${GITEA_HOSTNAME:-gitea.briklab.test}
      - GITEA__server__ROOT_URL=http://${GITEA_HOSTNAME:-gitea.briklab.test}:${GITEA_HTTP_PORT:-3000}/
      - GITEA__server__HTTP_PORT=${GITEA_HTTP_PORT:-3000}
      - GITEA__server__SSH_PORT=${GITEA_SSH_PORT:-222}
      - GITEA__server__SSH_LISTEN_PORT=22
    ports:
      - "${GITEA_HTTP_PORT:-3000}:${GITEA_HTTP_PORT:-3000}"
      - "${GITEA_SSH_PORT:-222}:22"
    volumes:
      - ./data/gitea:/data
    networks:
      brik-net:
        ipv4_address: 172.20.0.20
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${GITEA_HTTP_PORT:-3000}/api/v1/version"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --- Jenkins ---
  jenkins:
    build:
      context: .
      dockerfile: images/jenkins/Dockerfile
    container_name: brik-jenkins
    hostname: ${JENKINS_HOSTNAME:-jenkins.briklab.test}
    restart: unless-stopped
    environment:
      - JENKINS_OPTS=--httpPort=${JENKINS_HTTP_PORT:-9090}
      - CASC_JENKINS_CONFIG=/var/jenkins_casc/casc.yaml
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:-changeme_jenkins_admin}
      - NEXUS_ADMIN_PASSWORD=${NEXUS_ADMIN_PASSWORD:-Brik-Nexus-2026}
      - NEXUS_NPM_TOKEN=${NEXUS_NPM_TOKEN:-}
      - ARGOCD_PORT=${ARGOCD_PORT:-9080}
      - ARGOCD_AUTH_TOKEN=${ARGOCD_AUTH_TOKEN:-}
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx4g
    ports:
      - "${JENKINS_HTTP_PORT:-9090}:${JENKINS_HTTP_PORT:-9090}"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    volumes:
      - ./data/jenkins:/var/jenkins_home
      - ./config/jenkins/casc.yaml:/var/jenkins_casc/casc.yaml:ro
      - ./data/k3d/kubeconfig:/opt/brik/kubeconfig:ro
      # SSH deploy key for node-deploy-ssh E2E test (read-only).
      # The deploy stage container inherits this mount via --volumes-from.
      - ./data/ssh-target/deploy_key:/opt/brik/ssh/deploy_key:ro
      # Docker socket for pipeline builds (local lab only -- not for production)
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      brik-net:
        ipv4_address: 172.20.0.21
    extra_hosts:
      - "${GITLAB_HOSTNAME:-gitlab.briklab.test}:172.20.0.10"
      - "${GITEA_HOSTNAME:-gitea.briklab.test}:172.20.0.20"
      - "${NEXUS_HOSTNAME:-nexus.briklab.test}:172.20.0.30"
      - "ssh-target.briklab.test:172.20.0.41"
    mem_limit: 6g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${JENKINS_HTTP_PORT:-9090}/login"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # --- SSH target ---
  # Alpine container with openssh-server for deploy E2E tests (rsync, scp).
  # SSH keys are generated on first run via the entrypoint script.
  ssh-target:
    build:
      context: ./images/ssh-target
      dockerfile: Dockerfile
    container_name: brik-ssh-target
    hostname: ssh-target.briklab.test
    restart: unless-stopped
    ports:
      - "${SSH_TARGET_PORT:-2223}:22"
    volumes:
      - ./data/ssh-target/authorized_keys:/home/deploy/.ssh/authorized_keys_mounted:ro
      - ./data/ssh-target/app:/opt/app
    networks:
      brik-net:
        ipv4_address: 172.20.0.41
    mem_limit: 128m
    healthcheck:
      test: ["CMD-SHELL", "pgrep sshd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # --- Sonatype Nexus 3 CE ---
  nexus:
    image: sonatype/nexus3:3.90.2-alpine
    container_name: brik-nexus
    hostname: ${NEXUS_HOSTNAME:-nexus.briklab.test}
    restart: unless-stopped
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms512m -Xmx1g -XX:MaxDirectMemorySize=256m
    ports:
      - "${NEXUS_HTTP_PORT:-8081}:8081"
      - "${NEXUS_DOCKER_PORT:-8082}:8082"
    volumes:
      - ./data/nexus:/nexus-data
    networks:
      brik-net:
        ipv4_address: 172.20.0.30
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/service/rest/v1/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 180s
